services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idp_app
    restart: unless-stopped
    working_dir: /var/www
    # environment:
    #   - DB_HOST=mariadb
    #   - DB_PORT=3306
    #   - DB_DATABASE=idp
    volumes:
      # Uncomment next line for development mode (will override permissions)
      - ./:/var/www
      # - ./storage:/var/www/storage
    ports:
      - "8000:80"
    networks:
      - database-network

volumes:
  mariadb:
    external: true

networks:
  database-network:
    name: database-network
