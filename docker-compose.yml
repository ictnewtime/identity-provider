services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: idp_app_2
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=idp_staging
      # - REDIS_HOST=redis
      # - REDIS_PORT=6379
    volumes:
      # Uncomment next line for development mode (will override permissions)
      - ./:/var/www
      # - ./storage:/var/www/storage
    ports:
      - "8001:80"
      - "5173:5173"
    networks:
      - database-network
    depends_on:
      - mariadb
      # - redis

  mariadb:
    image: mariadb:latest
    container_name: idp_mariadb_2
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: idp_staging
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      #nota: è sato creato un volume per la persistenza dei dati
      # con nome mariadb_data
      - mariadb_data:/var/lib/mysql
    networks:
      - database-network

  # redis:
  #   image: redis:7-alpine
  #   container_name: laravel_jwt_idp_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - laravel

volumes:
  mariadb_data:
    driver: local

networks:
  database-network:
    name: database-network
