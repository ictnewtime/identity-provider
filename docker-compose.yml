services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_jwt_idp_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=zanichelli_idp
      - DB_USERNAME=root
      - DB_PASSWORD=123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Uncomment next line for development mode (will override permissions)
      - ./:/var/www
      # - ./storage:/var/www/storage
    ports:
      - "8000:80"
    networks:
      - laravel
    depends_on:
      - mysql
      - redis

  mysql:
    image: mysql:8.0
    container_name: laravel_jwt_idp_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: zanichelli_idp
      MYSQL_ROOT_PASSWORD: 123
      MYSQL_PASSWORD: 123
      MYSQL_USER: laravel
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - laravel
    command: --default-authentication-plugin=mysql_native_password

  redis:
    image: redis:7-alpine
    container_name: laravel_jwt_idp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - laravel

volumes:
  dbdata:
    driver: local

networks:
  laravel:
    driver: bridge
