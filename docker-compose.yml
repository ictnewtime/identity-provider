services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel_jwt_idp_app
    restart: unless-stopped
    working_dir: /var/www
    environment:
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=newtime_idp
      - DB_USERNAME=root
      - DB_PASSWORD=123
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      # Uncomment next line for development mode (will override permissions)
      - ./:/var/www
      # - ./storage:/var/www/storage
    ports:
      - "8000:80"
    networks:
      - laravel
    depends_on:
      - mariadb
      # - redis

  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: unless-stopped
    tty: true
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: idp
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: 123
    volumes:
      #nota: è sato creato un volume per la persistenza dei dati
      # con nome mariadb_data
      - mariadb_data:/var/lib/mysql
    networks:
      - laravel

  # redis:
  #   image: redis:7-alpine
  #   container_name: laravel_jwt_idp_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - laravel

volumes:
  dbdata:
    driver: local

networks:
  laravel:
    driver: bridge
